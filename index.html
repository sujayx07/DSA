<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCS NQT Coding Sheet Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #6ee7b7 0%, #3b82f6 50%, #9333ea 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .custom-checkbox:checked + label {
            text-decoration: line-through;
            color: #94a3b8;
        }
        
        /* Smooth transitions */
        .tr-all {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen pb-12">

    <div class="gradient-bg text-white py-12 px-4 shadow-lg relative overflow-hidden mb-8 subtle-animate">
        <div class="absolute inset-0 bg-white/10 opacity-30 mix-blend-overlay pattern-grid"></div>
        <div class="max-w-6xl mx-auto relative z-10 text-center md:text-left md:flex justify-between items-center">
            <div>
                <span class="bg-white/20 text-white font-semibold text-xs px-3 py-1 rounded-full uppercase tracking-wider backdrop-blur-sm">Preparation Dashboard</span>
                <h1 class="text-3xl md:text-5xl font-extrabold mt-3 tracking-tight drop-shadow-sm">TCS NQT Coding Sheet</h1>
                <p class="text-blue-55 mt-2 max-w-2xl text-sm md:text-base text-white/90">
                    Master the Top 100 most frequent coding problems asked in TCS NQT, Ninja, and Digital exams. Track your progress locally.
                </p>
            </div>
            <div class="mt-6 md:mt-0 bg-white/10 backdrop-blur-md p-6 rounded-2xl border border-white/20 text-center min-w-[200px]">
                <div class="text-xs uppercase font-bold tracking-widest text-white/80">Overall Progress</div>
                <div class="text-4xl font-black my-1" id="progress-percent">0%</div>
                <div class="w-full bg-white/20 h-2 rounded-full overflow-hidden mt-2">
                    <div id="progress-bar" class="bg-white h-full tr-all" style="width: 0%"></div>
                </div>
                <div class="text-xs mt-2 text-white/90"><span id="completed-count">0</span> of <span id="total-count">0</span> Solved</div>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4">
        
        <div class="flex flex-col sm:flex-row gap-4 justify-between items-center mb-8">
            <div class="relative w-full sm:w-72">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="search-bar" placeholder="Search questions..." class="w-full pl-11 pr-4 py-2.5 rounded-xl border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-all text-sm">
            </div>
            <div class="flex gap-2 w-full sm:w-auto overflow-x-auto pb-1 sm:pb-0">
                <button onclick="filterCategory('all')" class="cat-btn px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap bg-blue-600 text-white shadow-md cursor-pointer tr-all">All Topics</button>
                <button onclick="filterCategory('array')" class="cat-btn px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 cursor-pointer tr-all">Arrays</button>
                <button onclick="filterCategory('numbers')" class="cat-btn px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 cursor-pointer tr-all">Numbers</button>
                <button onclick="filterCategory('numsystem')" class="cat-btn px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 cursor-pointer tr-all">Number System</button>
                <button onclick="filterCategory('sorting')" class="cat-btn px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 cursor-pointer tr-all">Sorting</button>
                <button onclick="filterCategory('string')" class="cat-btn px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 cursor-pointer tr-all">Strings</button>
            </div>
        </div>

        <div id="sheet-container" class="space-y-10">
            </div>
    </div>

        let totalQuestionsCount = 0;

        // Initialize and Build UI 
        function renderSheet() {
            const container = document.getElementById('sheet-container');
            container.innerHTML = '';
            totalQuestionsCount = 0;
            let questionGlobalIndex = 0;

            dataset.forEach(cat => {
                let sectionHTML = `
                    <div class="topic-section bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden tr-all" data-cat="${cat.catId}">
                        <div class="bg-gradient-to-r ${cat.color} px-6 py-4 flex items-center gap-3 text-white">
                            <div class="w-8 h-8 rounded-lg bg-white/20 flex items-center justify-center backdrop-blur-sm">
                                <i class="fa-solid ${cat.icon} text-sm"></i>
                            </div>
                            <h2 class="font-bold text-lg tracking-tight">${cat.category}</h2>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-slate-50 border-b border-slate-100 text-xs font-bold uppercase text-slate-500 tracking-wider">
                                        <th class="py-3.5 px-6 w-16 text-center">Done</th>
                                        <th class="py-3.5 px-4">Problem Statement</th>
                                        <th class="py-3.5 px-4 w-1/3">LeetCode Equivalency Match</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100 text-sm">
                `;

                cat.questions.forEach(q => {
                    totalQuestionsCount++;
                    const storageKey = `tcs_nqt_q_${questionGlobalIndex}`;
                    const isChecked = localStorage.getItem(storageKey) === 'true';

                    sectionHTML += `
                        <tr class="question-row hover:bg-slate-50/80 tr-all" data-name="${q.name.toLowerCase()}">
                            <td class="py-4 px-6 text-center">
                                <input type="checkbox" id="${storageKey}" onchange="toggleState('${storageKey}')" ${isChecked ? 'checked' : ''}
                                    class="custom-checkbox w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500 accent-blue-600 transition-all cursor-pointer">
                            </td>
                            <td class="py-4 px-4 font-medium text-slate-700">
                                <label for="${storageKey}" class="cursor-pointer select-none">${q.name}</label>
                            </td>
                            <td class="py-4 px-4">
                                ${q.lcUrl !== 'https://leetcode.com/problems/' ? `
                                    <a href="${q.lcUrl}" target="_blank" class="inline-flex items-center gap-1.5 text-xs font-semibold text-orange-600 bg-orange-50 hover:bg-orange-100 px-2.5 py-1.5 rounded-lg border border-orange-200/60 transition-colors">
                                        <i class="fa-solid fa-code text-[10px]"></i> ${q.lcName}
                                        <i class="fa-solid fa-arrow-up-right-from-square text-[9px] opacity-70"></i>
                                    </a>
                                ` : `
                                    <span class="inline-flex items-center text-xs font-medium text-slate-400 bg-slate-100 px-2.5 py-1.5 rounded-lg">
                                        <i class="fa-solid fa-shield-halved mr-1 text-[10px]"></i> Standard Custom Concept
                                    </span>
                                `}
                            </td>
                        </tr>
                    `;
                    questionGlobalIndex++;
                });

                sectionHTML += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                container.innerHTML += sectionHTML;
            });

            document.getElementById('total-count').innerText = totalQuestionsCount;
            calculateProgress();
        }

        // Handle Box Checked event
        function toggleState(key) {
            const box = document.getElementById(key);
            localStorage.setItem(key, box.checked);
            calculateProgress();
        }

        // Live calculation metrics
        function calculateProgress() {
            let done = 0;
            for (let i = 0; i < totalQuestionsCount; i++) {
                if (localStorage.getItem(`tcs_nqt_q_${i}`) === 'true') {
                    done++;
                }
            }
            const pct = totalQuestionsCount > 0 ? Math.round((done / totalQuestionsCount) * 100) : 0;
            
            document.getElementById('completed-count').innerText = done;
            document.getElementById('progress-percent').innerText = `${pct}%`;
            document.getElementById('progress-bar').style.width = `${pct}%`;
        }

        // Client-side search bar real-time filter
        document.getElementById('search-bar').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const rows = document.querySelectorAll('.question-row');
            
            rows.forEach(row => {
                const text = row.getAttribute('data-name');
                if (text.includes(keyword)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        });

        // Category Tab Switcher
        function filterCategory(catId) {
            // Adjust Active styles
            const buttons = document.querySelectorAll('.cat-btn');
            buttons.forEach(btn => {
                btn.className = "cat-btn px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 cursor-pointer tr-all";
            });

            event.currentTarget.className = "cat-btn px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap bg-blue-600 text-white shadow-md cursor-pointer tr-all";

            const sections = document.querySelectorAll('.topic-section');
            sections.forEach(sec => {
                if (catId === 'all' || sec.getAttribute('data-cat') === catId) {
                    sec.style.display = '';
                } else {
                    sec.style.display = 'none';
                }
            });
        }

        // Bootstrap on Page Loaded
        window.onload = renderSheet;
    </script>
</body>
</html>
